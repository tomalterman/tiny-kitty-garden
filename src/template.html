<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Arcade Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 10px;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Tablet landscape */
        @media (pointer: coarse) and (min-width: 700px) and (orientation: landscape) {
            body { padding: 0; justify-content: center; overflow: hidden; }
            #highScores { display: none; }
            #gameContainer {
                width: 100%; height: 100dvh;
                display: flex; align-items: center; justify-content: center;
            }
        }

        #gameContainer {
            position: relative;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #gameCanvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 4px solid #4a4a6a;
            border-radius: 4px;
        }

        #muteBtn {
            position: absolute; top: 10px; right: 10px;
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.3);
            font-size: 20px; cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        #muteBtn:hover { background: rgba(0,0,0,0.7); }

        #touchControls {
            position: absolute; bottom: 20px; left: 0; right: 0;
            display: none; justify-content: space-between;
            padding: 0 20px; pointer-events: none;
        }

        .touchBtn {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 3px solid rgba(255,255,255,0.4);
            color: white; font-size: 14px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto; user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .touchBtn:active { background: rgba(255,255,255,0.4); }

        /* Bigger touch buttons for tablets */
        @media (pointer: coarse) and (min-width: 700px) {
            #touchControls {
                bottom: 40px; padding: 0 60px;
                padding-left: max(60px, env(safe-area-inset-left));
                padding-right: max(60px, env(safe-area-inset-right));
                padding-bottom: env(safe-area-inset-bottom, 0);
            }
            .touchBtn { width: 120px; height: 120px; font-size: 20px; border-width: 4px; }
        }

        @media (pointer: coarse) {
            #touchControls { display: flex; }
            #instructions { display: none; }
        }

        @media (max-height: 700px) {
            #highScores h2 { font-size: 14px; margin-bottom: 5px; }
            .scoreEntry { font-size: 12px; margin: 2px 0; }
        }

        #instructions {
            color: #aaa; text-align: center; margin-top: 15px; font-size: 14px;
        }
        #instructions p { margin: 5px 0; }
        #instructions strong { color: #ffd700; }

        #highScores {
            color: #fff; text-align: center; margin-top: 15px;
            font-family: 'Courier New', monospace;
        }
        #highScores h2 {
            color: #ffd700; font-size: 18px; margin-bottom: 10px; letter-spacing: 2px;
        }
        .scoreEntry {
            font-size: 14px; margin: 4px 0; transition: all 0.3s; color: #888;
        }
        .scoreEntry.new { animation: newScore 0.5s ease-out; color: #ffd700; }
        .scoreEntry .rank { color: #666; }
        .scoreEntry .name { color: #aaa; margin: 0 10px; }
        .scoreEntry .score { color: #999; }

        @keyframes newScore {
            0% { transform: scale(2); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="touchControls"></div>
        <button id="muteBtn" aria-label="Toggle sound"></button>
    </div>
    <div id="instructions"></div>
    <div id="highScores">
        <h2>HIGH SCORES</h2>
        <div id="scoreList">
            <div class="scoreEntry"><span class="rank">&#x1F947;</span> <span class="name">---</span> <span class="score">000000</span></div>
            <div class="scoreEntry"><span class="rank">&#x1F948;</span> <span class="name">---</span> <span class="score">000000</span></div>
            <div class="scoreEntry"><span class="rank">&#x1F949;</span> <span class="name">---</span> <span class="score">000000</span></div>
            <div class="scoreEntry"><span class="rank">4.</span> <span class="name">---</span> <span class="score">000000</span></div>
            <div class="scoreEntry"><span class="rank">5.</span> <span class="name">---</span> <span class="score">000000</span></div>
            <div class="scoreEntry"><span class="rank">6.</span> <span class="name">---</span> <span class="score">000000</span></div>
            <div class="scoreEntry"><span class="rank">7.</span> <span class="name">---</span> <span class="score">000000</span></div>
            <div class="scoreEntry"><span class="rank">8.</span> <span class="name">---</span> <span class="score">000000</span></div>
            <div class="scoreEntry"><span class="rank">9.</span> <span class="name">---</span> <span class="score">000000</span></div>
            <div class="scoreEntry"><span class="rank">10.</span> <span class="name">---</span> <span class="score">000000</span></div>
        </div>
    </div>

    <script>
        /* BUILD_INSERT_JS */
    </script>
</body>
</html>
