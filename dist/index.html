        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 10px;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Tablet landscape */
        @media (pointer: coarse) and (min-width: 700px) and (orientation: landscape) {
            body { padding: 0; justify-content: center; overflow: hidden; }
            #highScores { display: none; }
            #gameContainer {
                width: 100%; height: 100dvh;
                display: flex; align-items: center; justify-content: center;
            }
        }

        #gameContainer {
            position: relative;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #gameCanvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 4px solid #4a4a6a;
            border-radius: 4px;
        }

        #muteBtn {
            position: absolute; top: 10px; right: 10px;
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.3);
            font-size: 20px; cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        #muteBtn:hover { background: rgba(0,0,0,0.7); }

        #touchControls {
            position: absolute; bottom: 20px; left: 0; right: 0;
            display: none; justify-content: space-between;
            padding: 0 20px; pointer-events: none;
        }

        .touchBtn {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 3px solid rgba(255,255,255,0.4);
            color: white; font-size: 14px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto; user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .touchBtn:active { background: rgba(255,255,255,0.4); }

        /* Bigger touch buttons for tablets */
        @media (pointer: coarse) and (min-width: 700px) {
            #touchControls {
                bottom: 40px; padding: 0 60px;
                padding-left: max(60px, env(safe-area-inset-left));
                padding-right: max(60px, env(safe-area-inset-right));
                padding-bottom: env(safe-area-inset-bottom, 0);
            }
            .touchBtn { width: 120px; height: 120px; font-size: 20px; border-width: 4px; }
        }

        @media (pointer: coarse) {
            #touchControls { display: flex; }
            #instructions { display: none; }
        }

        @media (max-height: 700px) {
            #highScores h2 { font-size: 14px; margin-bottom: 5px; }
            .scoreEntry { font-size: 12px; margin: 2px 0; }
        }

        #instructions {
            color: #aaa; text-align: center; margin-top: 15px; font-size: 14px;
        }
        #instructions p { margin: 5px 0; }
        #instructions strong { color: #ffd700; }

        #highScores {
            color: #fff; text-align: center; margin-top: 15px;
            font-family: 'Courier New', monospace;
        }
        #highScores h2 {
            color: #ffd700; font-size: 18px; margin-bottom: 10px; letter-spacing: 2px;
        }
        .scoreEntry {
            font-size: 14px; margin: 4px 0; transition: all 0.3s; color: #888;
        }
        .scoreEntry.new { animation: newScore 0.5s ease-out; color: #ffd700; }
        .scoreEntry .rank { color: #666; }
        .scoreEntry .name { color: #aaa; margin: 0 10px; }
        .scoreEntry .score { color: #999; }

        @keyframes newScore {
            0% { transform: scale(2); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Games that set GAME.hideUI hide the DOM chrome so the canvas is all you see. */
        body.game-no-ui #highScores,
        body.game-no-ui #instructions { display: none; }
        body.game-no-ui #muteBtn { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.5); }
    </style>

        // ---- src/game-config.js ----
// ==================== GAME CONFIGURATION ====================
// Tiny Kitty Garden — a cozy tap-to-play game for a 3 year old.

const GAME = {
    title: 'Tiny Kitty Garden',
    subtitle: '',
    version: 'v3',
    bgColor: '#fff4c9',

    // Unused — kept for template compatibility.
    firebase: {
        apiKey: "",
        authDomain: "",
        databaseURL: "",
        projectId: "",
        storageBucket: "",
        messagingSenderId: "",
        appId: ""
    },
    firebasePath: 'tiny-kitty-garden',
    localStoragePrefix: 'tinyKittyGarden',

    // Canvas resolution (384x216 = SNES-style)
    width: 384,
    height: 216,

    // No on-screen controls — the game is tap-the-canvas only.
    controls: [],

    // No instructions — the child can't read.
    instructions: [],

    // Hide score/hearts HUD, default title text, and the DOM scoreboard/instructions blocks.
    hideUI: true
};


// ---- src/engine/canvas.js ----
// ==================== CANVAS & SCALING ====================

function setupCanvas() {
    Engine.canvas = document.getElementById('gameCanvas');
    Engine.ctx = Engine.canvas.getContext('2d');
    Engine.canvas.width = GAME.width;
    Engine.canvas.height = GAME.height;

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Set page background and title
    document.body.style.background = GAME.bgColor;
    document.title = GAME.title;
}

function resizeCanvas() {
    const isTouchDevice = window.matchMedia('(pointer: coarse)').matches;
    const isLandscapeTablet = isTouchDevice && window.innerWidth >= 700 && window.innerWidth > window.innerHeight;

    let maxWidth, maxHeight;

    if (isLandscapeTablet) {
        maxWidth = window.innerWidth;
        maxHeight = window.innerHeight;
    } else {
        maxWidth = window.innerWidth - 20;
        const reservedHeight = isTouchDevice ? 120 : 180;
        maxHeight = window.innerHeight - reservedHeight;
    }

    let scale = Math.min(
        maxWidth / GAME.width,
        maxHeight / GAME.height
    );

    if (isLandscapeTablet) {
        scale = Math.max(1, scale);
    } else {
        scale = Math.max(1, Math.floor(scale));
    }

    Engine.canvas.style.width = (GAME.width * scale) + 'px';
    Engine.canvas.style.height = (GAME.height * scale) + 'px';
}


// ---- src/engine/sound.js ----
// ==================== SOUND ENGINE ====================

const Sound = {
    ctx: null,
    enabled: true,

    init() {
        const prefix = GAME.localStoragePrefix;
        this.enabled = localStorage.getItem(prefix + 'Sound') !== 'off';

        const muteBtn = document.getElementById('muteBtn');
        if (muteBtn) muteBtn.textContent = this.enabled ? '\uD83D\uDD0A' : '\uD83D\uDD07';

        const initAudio = () => {
            if (!this.ctx) {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
            document.removeEventListener('touchstart', initAudio);
            document.removeEventListener('keydown', initAudio);
            document.removeEventListener('click', initAudio);
        };
        document.addEventListener('touchstart', initAudio);
        document.addEventListener('keydown', initAudio);
        document.addEventListener('click', initAudio);

        // Mute button
        muteBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            this.enabled = !this.enabled;
            muteBtn.textContent = this.enabled ? '\uD83D\uDD0A' : '\uD83D\uDD07';
            localStorage.setItem(prefix + 'Sound', this.enabled ? 'on' : 'off');
        });
        muteBtn.addEventListener('touchstart', (e) => e.stopPropagation());
    },

    play(name) {
        if (!this.ctx || !this.enabled) return;
        if (typeof SOUNDS !== 'undefined' && SOUNDS[name]) {
            SOUNDS[name](this);
        }
    },

    playTone(startFreq, endFreq, duration, type, volume) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type || 'square';
        osc.frequency.setValueAtTime(startFreq, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(endFreq, this.ctx.currentTime + duration);
        gain.gain.setValueAtTime(volume || 0.3, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    },

    playNoise(duration, startFreq, endFreq) {
        if (!this.ctx) return;
        const bufferSize = this.ctx.sampleRate * duration;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

        const noise = this.ctx.createBufferSource();
        const filter = this.ctx.createBiquadFilter();
        const gain = this.ctx.createGain();
        noise.buffer = buffer;
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(startFreq || 1000, this.ctx.currentTime);
        filter.frequency.linearRampToValueAtTime(endFreq || 200, this.ctx.currentTime + duration);
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + duration);
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(this.ctx.destination);
        noise.start();
    }
};


// ---- src/engine/highscores.js ----
// ==================== HIGH SCORE SYSTEM ====================

const HighScores = {
    scores: [],
    lastPlayerName: '',
    database: null,

    init() {
        // Initialize 10 empty slots
        this.scores = Array.from({ length: 10 }, () => ({ name: '---', score: 0 }));
        this.lastPlayerName = sessionStorage.getItem(GAME.localStoragePrefix + 'LastName') || '';

        // Initialize Firebase if configured
        if (GAME.firebase.apiKey && GAME.firebase.databaseURL) {
            try {
                firebase.initializeApp(GAME.firebase);
                this.database = firebase.database();
            } catch (e) {
                // Firebase may already be initialized or config invalid
                console.warn('Firebase init:', e.message);
            }
        }

        this.load();
    },

    load() {
        const saved = localStorage.getItem(GAME.localStoragePrefix + 'HighScores');
        if (saved) {
            this.scores = JSON.parse(saved);
        }
        this.updateDisplay();

        if (this.database) {
            this.syncWithFirebase();
        }
    },

    syncWithFirebase() {
        const localScores = this.scores.filter(s => s.score > 0);

        this.database.ref(GAME.firebasePath)
            .orderByChild('score')
            .limitToLast(50)
            .once('value', (snapshot) => {
                const globalScores = [];
                snapshot.forEach((child) => globalScores.push(child.val()));

                localScores.forEach(local => {
                    const exists = globalScores.some(g =>
                        g.name === local.name && g.score === local.score
                    );
                    if (!exists && local.name !== '---') {
                        this.saveToFirebase(local.name, local.score);
                    }
                });

                this.loadGlobalHighScores();
            });
    },

    loadGlobalHighScores() {
        this.database.ref(GAME.firebasePath)
            .orderByChild('score')
            .limitToLast(10)
            .on('value', (snapshot) => {
                const globalScores = [];
                snapshot.forEach((child) => globalScores.push(child.val()));
                globalScores.sort((a, b) => b.score - a.score);

                if (globalScores.length > 0) {
                    while (globalScores.length < 10) {
                        globalScores.push({ name: '---', score: 0 });
                    }
                    this.scores = globalScores;
                    this.save();
                    this.updateDisplay();
                }
            });
    },

    save() {
        localStorage.setItem(GAME.localStoragePrefix + 'HighScores', JSON.stringify(this.scores));
    },

    saveToFirebase(name, score) {
        if (!this.database) return;
        const scoreId = name + '_' + score + '_' + Date.now();
        const scoreData = { name: name, score: score, timestamp: Date.now() };

        fetch('https://ipapi.co/json/')
            .then(res => res.json())
            .then(data => {
                scoreData.ip = data.ip;
                scoreData.city = data.city;
                scoreData.country = data.country_name;
                this.database.ref(GAME.firebasePath + '/' + scoreId).set(scoreData);
            })
            .catch(() => {
                this.database.ref(GAME.firebasePath + '/' + scoreId).set(scoreData);
            });
    },

    updateDisplay() {
        const entries = document.querySelectorAll('.scoreEntry');
        entries.forEach((entry, i) => {
            if (this.scores[i]) {
                entry.querySelector('.name').textContent = this.scores[i].name;
                entry.querySelector('.score').textContent = String(this.scores[i].score).padStart(6, '0');
            }
        });
    },

    check(score) {
        for (let i = 0; i < 10; i++) {
            if (score > this.scores[i].score) return i;
        }
        return -1;
    },

    add(name, score, rank) {
        this.lastPlayerName = name.toUpperCase();
        sessionStorage.setItem(GAME.localStoragePrefix + 'LastName', this.lastPlayerName);

        this.scores.splice(rank, 0, { name: name.toUpperCase(), score: score });
        this.scores = this.scores.slice(0, 10);
        this.save();
        this.saveToFirebase(name.toUpperCase(), score);

        this.updateDisplay();
        const entries = document.querySelectorAll('.scoreEntry');
        if (entries[rank]) {
            entries[rank].classList.add('new');
            setTimeout(() => entries[rank].classList.remove('new'), 1000);
        }
    }
};


// ---- src/engine/input.js ----
// ==================== INPUT MANAGER ====================

function setupInput() {
    // Build key-to-action map from GAME.controls
    const keyMap = {};
    GAME.controls.forEach(ctrl => {
        ctrl.keys.forEach(key => { keyMap[key] = ctrl.id; });
    });

    // Generate touch buttons
    const touchControls = document.getElementById('touchControls');
    touchControls.innerHTML = '';
    GAME.controls.forEach(ctrl => {
        const btn = document.createElement('div');
        btn.className = 'touchBtn';
        btn.id = 'touch_' + ctrl.id;
        btn.textContent = ctrl.label;
        touchControls.appendChild(btn);
    });

    // Generate instructions
    const instructions = document.getElementById('instructions');
    instructions.innerHTML = '';
    GAME.instructions.forEach(inst => {
        const p = document.createElement('p');
        p.innerHTML = '<strong>' + inst.label + ':</strong> ' + inst.keys;
        instructions.appendChild(p);
    });

    // Keyboard
    document.addEventListener('keydown', (e) => {
        if (Engine.state.showTitleScreen) {
            e.preventDefault();
            startGame();
            return;
        }

        if (Engine.state.gameOver && Engine.state.enteringName) {
            e.preventDefault();
            handleNameEntryKey(e);
            return;
        }

        if (Engine.state.gameOver) {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                restartGame();
            }
            return;
        }

        const action = keyMap[e.code];
        if (action) {
            e.preventDefault();
            Engine.input[action] = true;
        }
    });

    document.addEventListener('keyup', (e) => {
        const action = keyMap[e.code];
        if (action) {
            Engine.input[action] = false;
        }
    });

    // Touch buttons
    GAME.controls.forEach(ctrl => {
        const btn = document.getElementById('touch_' + ctrl.id);
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (Engine.state.showTitleScreen) { startGame(); return; }
            if (Engine.state.gameOver && !Engine.state.enteringName) { restartGame(); return; }
            Engine.input[ctrl.id] = true;
        });
        btn.addEventListener('touchend', () => { Engine.input[ctrl.id] = false; });
    });

    // Canvas click/touch for title, game over, name entry
    function handleCanvasInteraction(e) {
        e.preventDefault();
        const rect = Engine.canvas.getBoundingClientRect();
        const scaleX = GAME.width / rect.width;
        const scaleY = GAME.height / rect.height;
        let clientX, clientY;
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        const canvasX = (clientX - rect.left) * scaleX;
        const canvasY = (clientY - rect.top) * scaleY;

        if (Engine.state.showTitleScreen) { startGame(); return; }

        if (Engine.state.gameOver) {
            if (Engine.state.enteringName) {
                handleKeyboardTouch(canvasX, canvasY);
            } else {
                restartGame();
            }
            return;
        }

        // Active gameplay: dispatch to game-defined tap handler if present.
        if (typeof gameTap === 'function') {
            gameTap(canvasX, canvasY);
        }
    }

    Engine.canvas.addEventListener('click', handleCanvasInteraction);
    Engine.canvas.addEventListener('touchstart', handleCanvasInteraction);
}

function handleNameEntryKey(e) {
    if (e.code === 'Escape') {
        Engine.state.enteringName = false;
    } else if (e.code === 'Enter' && Engine.state.playerName.length === 3) {
        HighScores.add(Engine.state.playerName, Engine.state.score, Engine.state.newHighScoreRank);
        Engine.state.enteringName = false;
    } else if (e.code === 'Backspace' && Engine.state.playerName.length > 0) {
        Engine.state.playerName = Engine.state.playerName.slice(0, -1);
    } else if (e.key.length === 1 && e.key.match(/[a-zA-Z]/) && Engine.state.playerName.length < 3) {
        Engine.state.playerName += e.key.toUpperCase();
    }
}

function startGame() {
    Engine.state.showTitleScreen = false;
    Sound.play('start');
    restartGame();
}

function restartGame() {
    Engine.state.score = 0;
    Engine.state.health = 3;
    Engine.state.maxHealth = 3;
    Engine.state.gameOver = false;
    Engine.state.enteringName = false;
    Engine.state.playerName = '';
    Engine.state.newHighScoreRank = -1;
    Engine.particles = [];
    Engine.scorePopups = [];
    // Reset all inputs
    GAME.controls.forEach(ctrl => { Engine.input[ctrl.id] = false; });
    // Call game-specific init
    if (typeof gameInit === 'function') gameInit();
}


// ---- src/engine/particles.js ----
// ==================== PARTICLES & SCORE POPUPS ====================

function updateParticles(dt) {
    for (let i = Engine.particles.length - 1; i >= 0; i--) {
        const p = Engine.particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;
        if (p.life <= 0) Engine.particles.splice(i, 1);
    }
}

function drawParticles(ctx) {
    for (const p of Engine.particles) {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
}

function updateScorePopups(dt) {
    for (let i = Engine.scorePopups.length - 1; i >= 0; i--) {
        const popup = Engine.scorePopups[i];
        popup.y -= 0.5 * dt;
        popup.life -= dt;
        if (popup.life <= 0) Engine.scorePopups.splice(i, 1);
    }
}

function drawScorePopups(ctx) {
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    for (const popup of Engine.scorePopups) {
        ctx.fillStyle = popup.color || '#ffd700';
        ctx.globalAlpha = Math.max(0, popup.life / popup.maxLife);
        ctx.fillText(popup.text, popup.x, popup.y);
    }
    ctx.globalAlpha = 1;
}


// ---- src/engine/screens.js ----
// ==================== TITLE, GAME OVER, NAME ENTRY SCREENS ====================

const touchKeyboard = {
    letters: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split(''),
    btnSize: 20,
    gap: 2,
    cols: 9,
    startX: 0,
    startY: 92
};

function drawTitleScreen(ctx) {
    const w = GAME.width;
    const h = GAME.height;
    const time = Date.now() / 1000;
    const centerX = w / 2;

    // Let game draw custom title art behind text
    if (typeof gameTitleRender === 'function') {
        gameTitleRender(ctx, w, h, time);
    }

    // When hideUI is set and the game provides its own title renderer,
    // skip the engine's default title text, subtitle, prompt, and version.
    if (GAME.hideUI && typeof gameTitleRender === 'function') {
        return;
    }

    // Title shadow
    ctx.fillStyle = '#000';
    ctx.font = 'bold 28px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(GAME.title, centerX + 2, h / 2 - 20 + 2);

    // Title text
    ctx.fillStyle = '#ff4757';
    ctx.fillText(GAME.title, centerX, h / 2 - 20);

    // Title highlight
    ctx.fillStyle = '#ff6b6b';
    ctx.fillText(GAME.title, centerX - 1, h / 2 - 21);

    // Subtitle
    if (GAME.subtitle) {
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 10px monospace';
        ctx.fillText(GAME.subtitle, centerX, h / 2 - 2);
    }

    // Prompt (blinking)
    if (Math.sin(time * 3) > 0) {
        ctx.fillStyle = '#aaaaaa';
        ctx.font = '10px monospace';
        ctx.fillText('Press any key or tap to start', centerX, h / 2 + 25);
    }

    // Version
    ctx.fillStyle = '#555';
    ctx.font = '8px monospace';
    ctx.fillText(GAME.version, centerX, h - 8);

    ctx.textAlign = 'left';
}

function drawUI(ctx) {
    // Score
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SCORE: ' + String(Engine.state.score).padStart(6, '0'), 10, 20);

    // Health (hearts)
    ctx.textAlign = 'right';
    ctx.fillStyle = '#ff4757';
    ctx.font = '14px monospace';
    for (let i = 0; i < Engine.state.maxHealth; i++) {
        const x = GAME.width - 16 - i * 18;
        const y = 14;
        if (i < Engine.state.health) {
            // Filled heart
            drawHeart(ctx, x, y, 6, '#ff4757');
        } else {
            // Empty heart
            drawHeart(ctx, x, y, 6, '#333');
        }
    }
    ctx.textAlign = 'left';
}

function drawHeart(ctx, cx, cy, size, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    const x = cx - size;
    const y = cy - size * 0.5;
    ctx.moveTo(cx, y + size * 1.5);
    ctx.bezierCurveTo(cx - size * 2, y - size * 0.5, cx - size * 2, y + size, cx, y + size * 1.5);
    ctx.moveTo(cx, y + size * 1.5);
    ctx.bezierCurveTo(cx + size * 2, y - size * 0.5, cx + size * 2, y + size, cx, y + size * 1.5);
    ctx.fill();
}

function drawGameOverScreen(ctx) {
    const w = GAME.width;
    const h = GAME.height;

    // Let game draw behind overlay
    if (typeof gameOverRender === 'function') {
        gameOverRender(ctx, w, h);
    }

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(0, 0, w, h);
    ctx.textAlign = 'center';

    if (Engine.state.enteringName) {
        // GAME OVER
        ctx.fillStyle = '#ff4757';
        ctx.font = 'bold 18px monospace';
        ctx.fillText('GAME OVER', w / 2, 22);

        // Score
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 12px monospace';
        ctx.fillText('SCORE: ' + Engine.state.score, w / 2, 40);

        // New high score
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 10px monospace';
        ctx.fillText('NEW HIGH SCORE!', w / 2, 56);

        // Name entry boxes
        ctx.font = 'bold 14px monospace';
        const displayName = Engine.state.playerName.padEnd(3, '_');
        const startX = w / 2 - 30;
        for (let i = 0; i < 3; i++) {
            const letterX = startX + i * 20;
            ctx.fillStyle = i < Engine.state.playerName.length ? '#5c6bc0' : '#333';
            ctx.fillRect(letterX, 65, 18, 20);
            ctx.fillStyle = '#ffffff';
            ctx.fillText(displayName[i], letterX + 9, 80);
        }

        drawTouchKeyboard(ctx);

        // Skip hint
        ctx.fillStyle = '#666';
        ctx.font = '8px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('ESC to skip', w / 2, h - 8);
    } else {
        // Standard game over
        ctx.fillStyle = '#ff4757';
        ctx.font = 'bold 24px monospace';
        ctx.fillText('GAME OVER', w / 2, h / 2 - 20);

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 14px monospace';
        ctx.fillText('FINAL SCORE: ' + Engine.state.score, w / 2, h / 2 + 10);

        ctx.font = '10px monospace';
        ctx.fillText('Press SPACE or tap to play again', w / 2, h / 2 + 35);
    }

    ctx.textAlign = 'left';
}

// ==================== TOUCH KEYBOARD ====================

function drawTouchKeyboard(ctx) {
    const btnSize = 20;
    const gap = 2;
    const cols = 9;
    const startX = (GAME.width - (cols * (btnSize + gap))) / 2;
    const startY = 92;

    touchKeyboard.startX = startX;
    touchKeyboard.startY = startY;
    touchKeyboard.btnSize = btnSize;
    touchKeyboard.gap = gap;
    touchKeyboard.cols = cols;

    // Letter buttons (3 rows)
    for (let i = 0; i < 26; i++) {
        const row = Math.floor(i / cols);
        const col = i % cols;
        const x = startX + col * (btnSize + gap);
        const y = startY + row * (btnSize + gap);

        ctx.fillStyle = '#444';
        ctx.fillRect(x, y, btnSize, btnSize);
        ctx.fillStyle = '#666';
        ctx.fillRect(x, y, btnSize, 2);

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(touchKeyboard.letters[i], x + btnSize / 2, y + btnSize / 2 + 4);
    }

    // Bottom row: DEL, SKIP, OK
    const bottomY = startY + 3 * (btnSize + gap);

    // DEL
    ctx.fillStyle = '#833';
    ctx.fillRect(startX, bottomY, btnSize * 2, btnSize);
    ctx.fillStyle = '#a55';
    ctx.fillRect(startX, bottomY, btnSize * 2, 2);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('DEL', startX + btnSize, bottomY + btnSize / 2 + 4);

    // SKIP
    const skipX = startX + 2 * (btnSize + gap) + gap;
    ctx.fillStyle = '#555';
    ctx.fillRect(skipX, bottomY, btnSize * 3, btnSize);
    ctx.fillStyle = '#777';
    ctx.fillRect(skipX, bottomY, btnSize * 3, 2);
    ctx.fillStyle = '#ccc';
    ctx.fillText('SKIP', skipX + (btnSize * 3) / 2, bottomY + btnSize / 2 + 4);

    // OK
    const okX = startX + 6 * (btnSize + gap);
    const okEnabled = Engine.state.playerName.length === 3;
    ctx.fillStyle = okEnabled ? '#383' : '#333';
    ctx.fillRect(okX, bottomY, btnSize * 3, btnSize);
    if (okEnabled) {
        ctx.fillStyle = '#5a5';
        ctx.fillRect(okX, bottomY, btnSize * 3, 2);
    }
    ctx.fillStyle = okEnabled ? '#fff' : '#666';
    ctx.fillText('OK', okX + (btnSize * 3) / 2, bottomY + btnSize / 2 + 4);

    ctx.fillStyle = '#888';
    ctx.font = '8px monospace';
    ctx.fillText('Tap or type letters', GAME.width / 2, bottomY + btnSize + 12);
    ctx.textAlign = 'left';
}

function handleKeyboardTouch(canvasX, canvasY) {
    if (!Engine.state.enteringName) return;

    const kb = touchKeyboard;
    const btnSize = kb.btnSize;
    const gap = kb.gap;
    const cols = kb.cols;
    const startX = kb.startX;
    const startY = kb.startY;

    // Letter buttons
    for (let i = 0; i < 26; i++) {
        const row = Math.floor(i / cols);
        const col = i % cols;
        const x = startX + col * (btnSize + gap);
        const y = startY + row * (btnSize + gap);
        if (canvasX >= x && canvasX < x + btnSize && canvasY >= y && canvasY < y + btnSize) {
            if (Engine.state.playerName.length < 3) {
                Engine.state.playerName += kb.letters[i];
            }
            return;
        }
    }

    const bottomY = startY + 3 * (btnSize + gap);

    // DEL
    if (canvasX >= startX && canvasX < startX + btnSize * 2 &&
        canvasY >= bottomY && canvasY < bottomY + btnSize) {
        if (Engine.state.playerName.length > 0) {
            Engine.state.playerName = Engine.state.playerName.slice(0, -1);
        }
        return;
    }

    // SKIP
    const skipX = startX + 2 * (btnSize + gap) + gap;
    if (canvasX >= skipX && canvasX < skipX + btnSize * 3 &&
        canvasY >= bottomY && canvasY < bottomY + btnSize) {
        Engine.state.enteringName = false;
        return;
    }

    // OK
    const okX = startX + 6 * (btnSize + gap);
    if (canvasX >= okX && canvasX < okX + btnSize * 3 &&
        canvasY >= bottomY && canvasY < bottomY + btnSize) {
        if (Engine.state.playerName.length === 3) {
            HighScores.add(Engine.state.playerName, Engine.state.score, Engine.state.newHighScoreRank);
            Engine.state.enteringName = false;
        }
        return;
    }
}


// ---- src/engine/loop.js ----
// ==================== GAME LOOP ====================

let _lastTime = 0;
const _TARGET_FPS = 60;
const _FRAME_TIME = 1000 / _TARGET_FPS;

// Debug
const DEBUG = {
    showFps: new URLSearchParams(window.location.search).get('debug') === 'fps',
    fps: 0, fpsFrames: 0, fpsLastTime: 0, frameTime: 0
};

function gameLoop(currentTime) {
    requestAnimationFrame(gameLoop);

    if (!Engine.state.running) return;

    const frameStart = performance.now();
    const deltaTime = _lastTime ? Math.min((currentTime - _lastTime) / _FRAME_TIME, 3) : 1;
    _lastTime = currentTime;

    const ctx = Engine.ctx;
    const w = GAME.width;
    const h = GAME.height;

    // Clear canvas
    ctx.fillStyle = GAME.bgColor;
    ctx.fillRect(0, 0, w, h);

    // Title screen
    if (Engine.state.showTitleScreen) {
        drawTitleScreen(ctx);
        return;
    }

    // Update game logic
    if (!Engine.state.gameOver) {
        if (typeof gameUpdate === 'function') {
            gameUpdate(deltaTime);
        }
        updateParticles(deltaTime);
        updateScorePopups(deltaTime);

        // Check for game over
        if (Engine.state.health <= 0) {
            Engine.state.health = 0;
            Engine.state.gameOver = true;
            Sound.play('gameOver');
            Engine.state.newHighScoreRank = HighScores.check(Engine.state.score);
            if (Engine.state.newHighScoreRank >= 0) {
                Engine.state.enteringName = true;
                Engine.state.playerName = HighScores.lastPlayerName;
            }
        }
    }

    // Render game
    if (typeof gameRender === 'function') {
        gameRender(ctx, w, h);
    }

    // Draw engine overlays
    drawParticles(ctx);
    drawScorePopups(ctx);

    if (!Engine.state.gameOver && !GAME.hideUI) {
        drawUI(ctx);
    }

    if (Engine.state.gameOver) {
        drawGameOverScreen(ctx);
    }

    // Debug FPS
    if (DEBUG.showFps) {
        DEBUG.frameTime = performance.now() - frameStart;
        DEBUG.fpsFrames++;
        if (currentTime - DEBUG.fpsLastTime >= 1000) {
            DEBUG.fps = DEBUG.fpsFrames;
            DEBUG.fpsFrames = 0;
            DEBUG.fpsLastTime = currentTime;
        }
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(5, h - 25, 55, 20);
        ctx.fillStyle = DEBUG.fps >= 55 ? '#44ff44' : (DEBUG.fps >= 40 ? '#ffff44' : '#ff4444');
        ctx.font = 'bold 10px monospace';
        ctx.textAlign = 'left';
        ctx.fillText('FPS: ' + DEBUG.fps, 10, h - 10);
    }
}

// ==================== GAME LOGIC: TINY KITTY GARDEN ====================
// A cozy tap-to-play game for a 3 year old. No score, no timer, no text,
// no way to lose. Tap anywhere, kitten walks there. Tap things to make
// cute events happen. Fill the shelf, watch a celebration, do it again.

// ---------- Soft Game Boy Color palette ----------
const PAL = {
    skyDay:   '#fff4c9',
    skyDusk:  '#f9c7d1',
    mint:     '#b8e8c6',
    mintDk:   '#8ec9a0',
    mintDp:   '#6ba686',

    skyDk:    '#7bb9ec',
    sea:      '#9dd4f3',
    seaDk:    '#6fb5dc',

    sandDk:   '#e9c875',

    pinkDk:   '#e08899',

    white:    '#ffffff',
    wood:     '#d4a878',
    woodDk:   '#8b6a48',
    stone:    '#c0b8aa',
    outline:  '#5a4033',
    shadow:   'rgba(0,0,0,0.15)',
    eye:      '#2a1f26',
    red:      '#ff6b8a',
    orange:   '#ffb16b',
    yellow:   '#ffe07a',
    green:    '#9cdd7a',
    blue:     '#8ec5ff',
    purple:   '#c9a2ff',
    star:     '#fff3a3',
    frogG:    '#8ccc66',
    frogGD:   '#5c9c46',
    crab:     '#ff8a70',
    crabDk:   '#c0553a',
    mouse:    '#cdb7a3',
    mouseDk:  '#8e7a66',
    butterY:  '#ffe85a'
};

const SHELF_H = 28;
const PLAY_TOP = SHELF_H;

// ---------- World state ----------
let world = null;

// ==================== ENGINE HOOKS ====================

function gameInit() {
    // Keep the engine from ever triggering game-over.
    Engine.state.health = 1;
    Engine.state.maxHealth = 0;
    Engine.state.score = 0;

    world = {
        room: 'garden',
        kitten: {
            x: GAME.width / 2,
            y: PLAY_TOP + (GAME.height - PLAY_TOP) / 2 + 20,
            tx: null,
            ty: null,
            speed: 0.65,
            facing: 'down',
            walkFrame: 0,
            walkDist: 0,
            busy: null,
            purrTimer: 0
        },
        pawPrints: [],
        floaters: [],
        shelf: {
            flowers:     [false, false, false, false, false],
            butterflies: [false, false, false],
            shells:      [false, false, false, false, false, false],
            yarnBalls:   [false, false, false, false],
            stars:       [false, false, false, false, false, false, false, false],
            treats:      [false, false, false, false]
        },
        rooms: buildRooms(),
        weather: pickWeather(),
        weatherParticles: [],
        night: false,
        transition: null,
        celebrating: null,
        lullabyTimer: 120,
        sessionTick: 0
    };

    seedWeather();
}

function gameUpdate(dt) {
    world.sessionTick += dt;

    if (world.transition) {
        updateTransition(dt);
        updateFloaters(dt);
        updateWeather(dt);
        return;
    }

    if (world.celebrating) {
        updateCelebration(dt);
    } else {
        updateKitten(dt);
        updateHotspots(dt);
        updateCollectibles(dt);
        checkShelfFull();
    }

    updateFloaters(dt);
    updatePawPrints(dt);
    updateWeather(dt);
    updateLullaby(dt);

    if (world.kitten.purrTimer > 0) world.kitten.purrTimer -= dt;
}

function gameRender(ctx, w, h) {
    const room = currentRoom();

    // Sky/ground base fill
    ctx.fillStyle = room.bg;
    ctx.fillRect(0, PLAY_TOP, w, h - PLAY_TOP);

    // Room scenery
    room.draw(ctx);

    // Hotspots drawn inside room logic where needed, but dynamic layers go here
    drawHotspots(ctx, room);
    drawCollectibles(ctx, room);

    // Paw prints under kitten
    drawPawPrints(ctx);

    // Kitten
    drawKitten(ctx);

    // Floaters over kitten
    drawFloaters(ctx);

    // Edge arrows
    drawEdgeArrows(ctx);

    // Weather (rain/snow) over world
    drawWeather(ctx);

    // Night tint
    if (world.night) {
        ctx.fillStyle = 'rgba(40,30,90,0.32)';
        ctx.fillRect(0, PLAY_TOP, w, h - PLAY_TOP);
        drawMoon(ctx);
    }

    // Transition fade
    if (world.transition) drawTransition(ctx);

    // Celebration overlays
    if (world.celebrating) drawCelebration(ctx);

    // Shelf always on top
    drawShelf(ctx);
}

function gameTitleRender(ctx, w, h, time) {
    // Backdrop
    const sky = ctx.createLinearGradient(0, 0, 0, h);
    sky.addColorStop(0, PAL.skyDay);
    sky.addColorStop(1, PAL.mint);
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, w, h);

    // Rolling hills
    ctx.fillStyle = PAL.grass;
    ctx.beginPath();
    ctx.moveTo(0, h - 50);
    for (let x = 0; x <= w; x += 8) {
        ctx.lineTo(x, h - 50 + Math.sin((x + time * 20) * 0.05) * 4);
    }
    ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
    ctx.fill();

    ctx.fillStyle = PAL.grassDk;
    ctx.beginPath();
    ctx.moveTo(0, h - 30);
    for (let x = 0; x <= w; x += 8) {
        ctx.lineTo(x, h - 30 + Math.sin((x + time * 15 + 30) * 0.04) * 3);
    }
    ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
    ctx.fill();

    // Drifting butterflies
    for (let i = 0; i < 4; i++) {
        const bx = ((time * (18 + i * 5) + i * 97) % (w + 40)) - 20;
        const by = 40 + Math.sin(time * 2 + i) * 14 + i * 10;
        drawButterfly(ctx, bx, by, i % 4, time);
    }

    // Tiny flowers in the grass
    for (let i = 0; i < 8; i++) {
        const fx = (i * 53 + 17) % w;
        const fy = h - 20 - (i % 2) * 6;
        drawFlower(ctx, fx, fy, i % 5, false);
    }

    // Title logo card
    const cardW = 240, cardH = 60;
    const cx = (w - cardW) / 2;
    const cy = 30;
    ctx.fillStyle = 'rgba(255,249,240,0.9)';
    roundRect(ctx, cx, cy, cardW, cardH, 8);
    ctx.fill();
    ctx.strokeStyle = PAL.outline;
    ctx.lineWidth = 2;
    roundRect(ctx, cx, cy, cardW, cardH, 8);
    ctx.stroke();

    // Title text — the only copy on screen is the game name
    ctx.fillStyle = PAL.pinkDk;
    ctx.font = 'bold 20px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Tiny Kitty Garden', w / 2 + 1, cy + 28 + 1);
    ctx.fillStyle = PAL.red;
    ctx.fillText('Tiny Kitty Garden', w / 2, cy + 28);

    // Kitten in the middle of the card
    const kitX = w / 2 - 8;
    const kitY = cy + 34;
    drawKittenSprite(ctx, kitX, kitY, 'down', Math.floor(time * 2) % 2, null);

    // Pulsing paw-print prompt (art, not text)
    const pulse = (Math.sin(time * 3) + 1) / 2;
    const pawY = h - 70;
    ctx.globalAlpha = 0.6 + pulse * 0.4;
    drawPawIcon(ctx, w / 2, pawY, 10 + pulse * 2, PAL.red);
    ctx.globalAlpha = 1;

    ctx.textAlign = 'left';
}

function gameTap(x, y) {
    if (!world || world.transition) return;

    // Celebration absorbs all taps
    if (world.celebrating) return;

    // 1. Edge arrows (highest priority — they live on the edges)
    if (tryEdgeArrowTap(x, y)) return;

    // 2. Self-pet — tap on kitten
    if (kittenHitTest(x, y)) {
        purrKitten();
        return;
    }

    // 3. Collectibles
    if (tryCollectibleTap(x, y)) return;

    // 4. Hotspots
    if (tryHotspotTap(x, y)) return;

    // 5. Walk target — plain walk, not a hotspot queue
    if (y < PLAY_TOP + 6) return; // don't walk into shelf
    setKittenTarget(x, y);
    // Any previously-queued hotspot walk is now stale.
    const room = currentRoom();
    for (const hs of room.hotspots) hs.queued = false;
}

// ==================== KITTEN ====================

const KITTEN_W = 18;
const KITTEN_H = 18;

function updateKitten(dt) {
    const k = world.kitten;

    // If kitten is mid-reaction for a hotspot, delegate to that hotspot's logic
    if (k.busy) return;

    if (k.tx == null) return;
    const dx = k.tx - k.x;
    const dy = k.ty - k.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 1.2) {
        k.x = k.tx; k.y = k.ty;
        k.tx = null; k.ty = null;
        return;
    }
    const step = k.speed * dt;
    const mv = Math.min(step, dist);
    k.x += (dx / dist) * mv;
    k.y += (dy / dist) * mv;
    k.walkDist += mv;

    // Update facing
    if (Math.abs(dx) > Math.abs(dy)) {
        k.facing = dx > 0 ? 'right' : 'left';
    } else {
        k.facing = dy > 0 ? 'down' : 'up';
    }

    // Advance walk frame every ~7 pixels
    if (k.walkDist > 7) {
        k.walkFrame = 1 - k.walkFrame;
        k.walkDist = 0;

        // Paw print trail
        world.pawPrints.push({
            x: k.x + (Math.random() - 0.5) * 4,
            y: k.y + 6 + (Math.random() - 0.5) * 2,
            life: 90,
            maxLife: 90
        });
    }

    // Clamp to play area
    k.x = Math.max(10, Math.min(GAME.width - 10, k.x));
    k.y = Math.max(PLAY_TOP + 10, Math.min(GAME.height - 8, k.y));
}

function setKittenTarget(x, y) {
    const k = world.kitten;
    k.tx = x;
    k.ty = Math.max(PLAY_TOP + 10, Math.min(GAME.height - 8, y));
    k.busy = null;
}

// Queue a walk toward a hotspot so that when the kitten arrives at that exact
// target point (tx/ty), the hotspot's arrival reaction fires. Using the
// queued target directly (rather than the hotspot center) avoids
// geometry traps when the aim-point is offset from the hit box.
function queueHotspotWalk(hs, x, y) {
    setKittenTarget(x, y);
    hs.queued = true;
    hs.queuedX = world.kitten.tx;
    hs.queuedY = world.kitten.ty;
}

function kittenHitTest(x, y) {
    const k = world.kitten;
    return (
        x >= k.x - KITTEN_W / 2 && x <= k.x + KITTEN_W / 2 &&
        y >= k.y - KITTEN_H && y <= k.y + 2
    );
}

function purrKitten() {
    const k = world.kitten;
    k.purrTimer = 40;
    spawnFloater({
        kind: 'heart',
        x: k.x,
        y: k.y - KITTEN_H,
        vy: -0.5,
        life: 60,
        maxLife: 60
    });
    Sound.play('prrr');
}

function drawKitten(ctx) {
    const k = world.kitten;
    const frame = k.tx != null ? k.walkFrame : 0;
    drawKittenSprite(
        ctx,
        Math.round(k.x - KITTEN_W / 2),
        Math.round(k.y - KITTEN_H),
        k.facing,
        frame,
        world.night ? null : (world.weather === 'rain' ? 'umbrella' : (world.weather === 'snow' ? 'winter' : null))
    );

    // Purr curls when recently petted
    if (k.purrTimer > 0) {
        ctx.strokeStyle = PAL.pinkDk;
        ctx.lineWidth = 1;
        const t = 40 - k.purrTimer;
        for (let i = 0; i < 3; i++) {
            const cx = k.x + (i - 1) * 4;
            const cy = k.y - KITTEN_H - 4 - t * 0.2;
            ctx.beginPath();
            ctx.arc(cx, cy, 1.5 + i * 0.3, 0, Math.PI * 2);
            ctx.stroke();
        }
    }
}

// The kitten is drawn procedurally with fillRect blocks for a chunky pixel look.
// (x,y) is the top-left of an 18x18 box.
function drawKittenSprite(ctx, x, y, facing, frame, accessory) {
    // Shadow
    ctx.fillStyle = PAL.shadow;
    ctx.beginPath();
    ctx.ellipse(x + 9, y + 18, 8, 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Leg wiggle
    const lift = frame === 1 ? 1 : 0;

    // Body
    ctx.fillStyle = PAL.cream;
    ctx.fillRect(x + 2, y + 9, 14, 8);
    // Outline body
    ctx.fillStyle = PAL.outline;
    ctx.fillRect(x + 2, y + 9, 14, 1);  // top
    ctx.fillRect(x + 2, y + 16, 14, 1); // bottom
    ctx.fillRect(x + 2, y + 9, 1, 8);   // left
    ctx.fillRect(x + 15, y + 9, 1, 8);  // right

    // Legs
    ctx.fillStyle = PAL.outline;
    ctx.fillRect(x + 4, y + 17 - lift, 2, 1);
    ctx.fillRect(x + 12, y + 17 + lift, 2, 1);
    ctx.fillRect(x + 7, y + 17 + lift, 2, 1);

    // Tail — direction-specific
    ctx.fillStyle = PAL.cream;
    if (facing === 'right') {
        ctx.fillRect(x + 16, y + 10, 2, 1);
        ctx.fillRect(x + 17, y + 9, 1, 3);
        ctx.fillStyle = PAL.outline;
        ctx.fillRect(x + 16, y + 9, 2, 1);
        ctx.fillRect(x + 18, y + 9, 1, 3);
    } else if (facing === 'left') {
        ctx.fillRect(x, y + 10, 2, 1);
        ctx.fillRect(x - 1, y + 9, 1, 3);
        ctx.fillStyle = PAL.outline;
        ctx.fillRect(x, y + 9, 2, 1);
        ctx.fillRect(x - 2, y + 9, 1, 3);
    } else {
        ctx.fillRect(x + 15, y + 10, 3, 1);
        ctx.fillStyle = PAL.outline;
        ctx.fillRect(x + 15, y + 9, 3, 1);
        ctx.fillRect(x + 18, y + 9, 1, 2);
    }

    // Head (bigger than body — "chunky, big head")
    ctx.fillStyle = PAL.cream;
    ctx.fillRect(x + 2, y + 2, 14, 9);
    // Ears
    ctx.fillRect(x + 2, y, 3, 2);
    ctx.fillRect(x + 13, y, 3, 2);
    ctx.fillStyle = PAL.pink;
    ctx.fillRect(x + 3, y + 1, 1, 1);
    ctx.fillRect(x + 14, y + 1, 1, 1);
    // Head outline
    ctx.fillStyle = PAL.outline;
    ctx.fillRect(x + 2, y + 2, 14, 1);  // top
    ctx.fillRect(x + 2, y + 10, 14, 1); // bottom
    ctx.fillRect(x + 2, y + 2, 1, 9);
    ctx.fillRect(x + 15, y + 2, 1, 9);
    // Ear outlines
    ctx.fillRect(x + 2, y, 3, 1);
    ctx.fillRect(x + 5, y, 1, 2);
    ctx.fillRect(x + 13, y, 3, 1);
    ctx.fillRect(x + 12, y, 1, 2);
    ctx.fillRect(x + 1, y + 1, 1, 1);
    ctx.fillRect(x + 16, y + 1, 1, 1);

    // Face — depends on direction
    if (facing === 'up') {
        // back of head: tiny ears, no face
        ctx.fillStyle = PAL.cream;
        ctx.fillRect(x + 4, y + 5, 10, 3);
    } else {
        // Eyes (always smiling arcs)
        ctx.fillStyle = PAL.eye;
        if (facing === 'left') {
            ctx.fillRect(x + 4, y + 5, 2, 1);
            ctx.fillRect(x + 9, y + 5, 2, 1);
        } else if (facing === 'right') {
            ctx.fillRect(x + 7, y + 5, 2, 1);
            ctx.fillRect(x + 12, y + 5, 2, 1);
        } else {
            ctx.fillRect(x + 5, y + 5, 2, 1);
            ctx.fillRect(x + 11, y + 5, 2, 1);
        }
        // Nose
        ctx.fillStyle = PAL.pinkDk;
        ctx.fillRect(x + 8, y + 7, 2, 1);
        // Smile
        ctx.fillStyle = PAL.outline;
        ctx.fillRect(x + 7, y + 8, 1, 1);
        ctx.fillRect(x + 8, y + 9, 2, 1);
        ctx.fillRect(x + 10, y + 8, 1, 1);
        // Cheek blush
        ctx.fillStyle = PAL.pink;
        ctx.fillRect(x + 4, y + 7, 1, 1);
        ctx.fillRect(x + 13, y + 7, 1, 1);
    }

    // Accessory overlay (umbrella for rain, jacket+hat for snow)
    if (accessory === 'umbrella') {
        // Umbrella canopy
        ctx.fillStyle = PAL.red;
        ctx.fillRect(x + 1, y - 5, 16, 2);
        ctx.fillRect(x + 3, y - 6, 12, 1);
        ctx.fillStyle = PAL.white;
        ctx.fillRect(x + 5, y - 5, 2, 2);
        ctx.fillRect(x + 11, y - 5, 2, 2);
        // Handle
        ctx.fillStyle = PAL.woodDk;
        ctx.fillRect(x + 9, y - 3, 1, 5);
        ctx.fillStyle = PAL.outline;
        ctx.fillRect(x + 1, y - 3, 16, 1);
    } else if (accessory === 'winter') {
        // Scarf across body
        ctx.fillStyle = PAL.red;
        ctx.fillRect(x + 2, y + 10, 14, 2);
        ctx.fillStyle = PAL.white;
        ctx.fillRect(x + 4, y + 10, 1, 2);
        ctx.fillRect(x + 8, y + 10, 1, 2);
        ctx.fillRect(x + 12, y + 10, 1, 2);
        // Hat
        ctx.fillStyle = PAL.red;
        ctx.fillRect(x + 4, y - 2, 10, 2);
        ctx.fillRect(x + 5, y - 3, 8, 1);
        ctx.fillStyle = PAL.white;
        ctx.fillRect(x + 4, y, 10, 1);
        // Pom
        ctx.fillRect(x + 8, y - 4, 2, 1);
    }
}

// ==================== PAW PRINTS ====================

function updatePawPrints(dt) {
    for (let i = world.pawPrints.length - 1; i >= 0; i--) {
        world.pawPrints[i].life -= dt;
        if (world.pawPrints[i].life <= 0) world.pawPrints.splice(i, 1);
    }
}

function drawPawPrints(ctx) {
    for (const p of world.pawPrints) {
        ctx.globalAlpha = Math.max(0, p.life / p.maxLife) * 0.5;
        ctx.fillStyle = PAL.outline;
        ctx.fillRect(Math.round(p.x - 1), Math.round(p.y), 1, 1);
        ctx.fillRect(Math.round(p.x + 1), Math.round(p.y), 1, 1);
        ctx.fillRect(Math.round(p.x), Math.round(p.y + 1), 1, 1);
    }
    ctx.globalAlpha = 1;
}

// ==================== FLOATERS ====================
// Floaters are short-lived bits: hearts, Zs, sparkles, flying collectibles.

function spawnFloater(f) {
    world.floaters.push(f);
}

function flushFloatersOnArrive() {
    for (const f of world.floaters) {
        if (f.onArrive) f.onArrive();
    }
    world.floaters = [];
}

function updateFloaters(dt) {
    for (let i = world.floaters.length - 1; i >= 0; i--) {
        const f = world.floaters[i];
        f.life -= dt;

        if (f.flyTo) {
            // Steer toward shelf target over its life
            const t = 1 - f.life / f.maxLife;
            f.x = lerp(f.startX, f.flyTo.x, easeOut(t));
            f.y = lerp(f.startY, f.flyTo.y, easeOut(t));
        } else {
            if (f.vx != null) f.x += f.vx * dt;
            if (f.vy != null) f.y += f.vy * dt;
        }

        if (f.life <= 0) {
            if (f.onArrive) f.onArrive();
            world.floaters.splice(i, 1);
        }
    }
}

function drawFloaters(ctx) {
    for (const f of world.floaters) {
        const alpha = Math.min(1, f.life / (f.maxLife * 0.4));
        ctx.globalAlpha = Math.max(0.2, alpha);
        if (f.kind === 'heart') {
            drawHeartIcon(ctx, f.x, f.y, 4, PAL.red);
        } else if (f.kind === 'z') {
            ctx.fillStyle = PAL.sky;
            ctx.font = 'bold 10px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('z', f.x, f.y);
        } else if (f.kind === 'mrrp') {
            ctx.fillStyle = PAL.pinkDk;
            ctx.font = 'bold 6px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('~', f.x, f.y);
        } else if (f.kind === 'flower') {
            drawFlower(ctx, f.x, f.y, f.color, true);
        } else if (f.kind === 'butterfly') {
            drawButterfly(ctx, f.x, f.y, f.color, world.sessionTick / 60);
        } else if (f.kind === 'shell') {
            drawShell(ctx, f.x, f.y, f.shape);
        } else if (f.kind === 'yarn') {
            drawYarnBall(ctx, f.x, f.y, f.color);
        } else if (f.kind === 'star') {
            drawStarIcon(ctx, f.x, f.y, 4, PAL.star);
        } else if (f.kind === 'treat') {
            drawTreat(ctx, f.x, f.y);
        } else if (f.kind === 'splash') {
            ctx.fillStyle = PAL.sea;
            ctx.fillRect(f.x - 1, f.y, 2, 1);
        } else if (f.kind === 'crumb') {
            ctx.fillStyle = PAL.wood;
            ctx.fillRect(f.x, f.y, 1, 1);
        }
    }
    ctx.globalAlpha = 1;
}

// ==================== SHELF ====================

function drawShelf(ctx) {
    // Backdrop
    const g = ctx.createLinearGradient(0, 0, 0, SHELF_H);
    g.addColorStop(0, PAL.lav);
    g.addColorStop(1, PAL.pink);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, GAME.width, SHELF_H);

    // Bottom shelf plank
    ctx.fillStyle = PAL.wood;
    ctx.fillRect(0, SHELF_H - 4, GAME.width, 3);
    ctx.fillStyle = PAL.woodDk;
    ctx.fillRect(0, SHELF_H - 1, GAME.width, 1);

    // Outline divider
    ctx.fillStyle = PAL.outline;
    ctx.fillRect(0, SHELF_H - 5, GAME.width, 1);

    // Bins: flowers | butterflies | shells | yarn | stars | treats
    const bins = [
        { key: 'flowers',     count: 5, drawer: (ctx, x, y, filled, i) => drawFlower(ctx, x, y, i, filled) },
        { key: 'butterflies', count: 3, drawer: (ctx, x, y, filled, i) => drawButterfly(ctx, x, y, i, filled ? 0 : -1) },
        { key: 'shells',      count: 6, drawer: (ctx, x, y, filled, i) => drawShell(ctx, x, y, i, filled) },
        { key: 'yarnBalls',   count: 4, drawer: (ctx, x, y, filled, i) => drawYarnBall(ctx, x, y, i, filled) },
        { key: 'stars',       count: 8, drawer: (ctx, x, y, filled, i) => drawStarIcon(ctx, x, y, 3, filled ? PAL.star : '#d0c7b0') },
        { key: 'treats',      count: 4, drawer: (ctx, x, y, filled, i) => drawTreat(ctx, x, y, filled) }
    ];

    const pad = 2;
    const available = GAME.width - pad * 2;
    let xCursor = pad;
    const totalCount = bins.reduce((s, b) => s + b.count, 0);
    // Each slot ~11px wide
    const slotW = Math.floor((available - (bins.length - 1) * 4) / totalCount);

    for (const bin of bins) {
        const binW = slotW * bin.count;
        // Bin outline
        ctx.fillStyle = 'rgba(255,255,255,0.45)';
        ctx.fillRect(xCursor - 1, 3, binW + 2, SHELF_H - 9);
        for (let i = 0; i < bin.count; i++) {
            const ix = xCursor + i * slotW + Math.floor(slotW / 2) - 4;
            const iy = 10;
            const filled = world.shelf[bin.key][i];
            if (!filled) ctx.globalAlpha = 0.3;
            bin.drawer(ctx, ix, iy, filled, i);
            ctx.globalAlpha = 1;
        }
        xCursor += binW + 4;
    }
}

function checkShelfFull() {
    if (world.celebrating) return;
    for (const key of Object.keys(world.shelf)) {
        for (const v of world.shelf[key]) if (!v) return;
    }
    startCelebration();
}

// ==================== CELEBRATION ====================

function startCelebration() {
    world.celebrating = { t: 0, duration: 300, confetti: [] };
    Sound.play('celebrate');
    // Seed confetti
    for (let i = 0; i < 60; i++) {
        world.celebrating.confetti.push({
            x: Math.random() * GAME.width,
            y: -10 - Math.random() * 40,
            vx: (Math.random() - 0.5) * 1.2,
            vy: 0.6 + Math.random() * 0.8,
            color: [PAL.red, PAL.yellow, PAL.green, PAL.blue, PAL.purple, PAL.pink][i % 6],
            size: 2 + Math.floor(Math.random() * 2),
            rot: Math.random() * Math.PI * 2,
            spin: (Math.random() - 0.5) * 0.2
        });
    }
}

function updateCelebration(dt) {
    const c = world.celebrating;
    c.t += dt;
    for (const p of c.confetti) {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.rot += p.spin * dt;
        if (p.y > GAME.height + 10) {
            p.y = -10;
            p.x = Math.random() * GAME.width;
        }
    }
    // Kitten happy-dance hop
    const k = world.kitten;
    k.tx = null; k.ty = null;
    k.busy = 'dance';
    const hop = Math.abs(Math.sin(c.t * 0.3)) * 6;
    k.y = PLAY_TOP + (GAME.height - PLAY_TOP) / 2 + 20 - hop;

    if (c.t >= c.duration) {
        resetShelfForNextRound();
        world.celebrating = null;
        k.busy = null;
    }
}

function drawCelebration(ctx) {
    const c = world.celebrating;
    for (const p of c.confetti) {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size, -p.size, p.size * 2, p.size * 2);
        ctx.restore();
    }
    // Big pink heart above kitten
    const k = world.kitten;
    drawHeartIcon(ctx, k.x, k.y - 30, 8, PAL.red);
}

function resetShelfForNextRound() {
    // Drop any lingering floaters without firing onArrive — otherwise a
    // stray onArrive would pre-mark a slot in the fresh shelf.
    world.floaters = [];
    for (const key of Object.keys(world.shelf)) {
        world.shelf[key].fill(false);
    }
    world.rooms = buildRooms();
    world.night = false;
    // Keep weather for the session — feels continuous
}

function makeGardenCollectibles() {
    // 5 flowers with unique colors at fixed positions
    const positions = [
        { x: 40,  y: 180 },
        { x: 160, y: 175 },
        { x: 200, y: 190 },
        { x: 280, y: 175 },
        { x: 340, y: 190 }
    ];
    const flowers = positions.map((p, i) => ({
        kind: 'flower', x: p.x, y: p.y, color: i, collected: false
    }));
    // 3 butterflies drifting in sine paths
    const butters = [];
    for (let i = 0; i < 3; i++) {
        butters.push({
            kind: 'butterfly',
            baseX: 40 + i * 110,
            baseY: 90 + i * 10,
            t: i * 2.1,
            color: i,
            collected: false,
            x: 0, y: 0,
            onKitten: 0
        });
    }
    return [...flowers, ...butters];
}

function makeBeachCollectibles() {
    const positions = [
        { x: 30,  y: 175 }, { x: 70,  y: 190 }, { x: 130, y: 180 },
        { x: 200, y: 190 }, { x: 260, y: 175 }, { x: 340, y: 185 }

    return positions.map((p, i) => ({
        kind: 'shell', x: p.x, y: p.y, shape: i, collected: false

function drawGarden(ctx) {

    drawTree(ctx, 20, 150);
    drawTree(ctx, 360, 150);
    drawTree(ctx, 300, 145);
    // Bushes
    drawBush(ctx, 110, 145);
    drawBush(ctx, 250, 148);
    // Pond shimmer
    const room = world.rooms.garden;
    const pond = room.hotspots.find(h => h.kind === 'pond');
    drawPond(ctx, pond);
    // Background micro-flowers (non-collectible)
    for (let i = 0; i < 10; i++) {
        const fx = (i * 37 + 17) % GAME.width;
